<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="login.css">
    <title>Instagram</title>
</head>

<body>

    <div class="container d-flex">
        <div class="right-side">
            <div class="edit-part">
                <div class="insta-logo">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="text-of-user">
                    <h1>See everyday moments from</h1>
                    <h2>your close friends.</h2>
                </div>

                <div class="insta-img">
                    <img src="../img/53X3pk-t2Gn.webp" alt="">
                </div>
            </div>
        </div>

        <div class="left-side">
            <div class="left-work">
                <div class="login-instagram">
                    <form>
                        <h2>Log into Instagram</h2>
                        <div class="mobile-email-input">
                            <input type="email" id="email" placeholder="Mobile number, username or email">
                        </div>
                        <div class="mobile-email-input">
                            <input type="email" id="pass" placeholder="Password">
                        </div>
                        <div class="btn-login">
                            <button>login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
